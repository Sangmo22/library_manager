{% extends "base.html" %}

{% block title %}Login | Library Manager{% endblock %}

{% block content %}
<section class="card" style="max-width: 560px; margin: 0 auto">
  <div class="section-header">
    <div>
      <h2>Sign In</h2>
      <p class="section-subtitle">Login to access the library dashboard.</p>
    </div>
  </div>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    <div class="actions">
      <button class="button" type="submit">Sign In</button>
      <a class="button secondary" href="{% url 'signup' %}">Create Account</a>
    </div>

    {% if form.errors %}
    <p style="color: #b91c1c; margin-top: 12px">
      Invalid username or password. Please try again.
    </p>
    {% endif %}
  </form>
</section>
{% endblock %}
