<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Library Manager{% endblock %}</title>
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #f5f7fb;
        color: #1f2937;
      }

      header {
        background: #434e66;
        color: #ffffff;
        padding: 20px 32px;
      }

      main {
        max-width: 900px;
        margin: 32px auto;
        padding: 0 16px;
      }

      .card {
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        padding: 24px;
      }

      .actions {
        margin-top: 16px;
      }

      .button {
        display: inline-block;
        padding: 10px 14px;
        border-radius: 8px;
        background: #1d4ed8;
        color: #ffffff;
        text-decoration: none;
        font-weight: 600;
        border: none;
        cursor: pointer;
      }

      .button.secondary {
        background: #4b5563;
      }

      form {
        margin-top: 20px;
      }

      form p {
        margin: 0 0 18px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #374151;
      }

      input,
      select,
      textarea {
        width: 100%;
        box-sizing: border-box;
        padding: 12px 14px;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        background: #ffffff;
        color: #111827;
        font: inherit;
      }

      input:focus,
      select:focus,
      textarea:focus {
        outline: none;
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
      }

      input[type="checkbox"] {
        width: auto;
      }

      .helptext {
        display: block;
        margin-top: 6px;
        color: #6b7280;
        font-size: 0.9rem;
      }

      .errorlist {
        margin: 8px 0 0;
        padding-left: 18px;
        color: #b91c1c;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
      }

      th,
      td {
        padding: 12px;
        border-bottom: 1px solid #e5e7eb;
        text-align: left;
      }

      th {
        font-size: 0.9rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #6b7280;
      }

      .status {
        font-weight: 600;
      }

      .status.available {
        color: #15803d;
      }

      .status.unavailable {
        color: #b91c1c;
      }

      .empty-state {
        padding: 24px 0;
        color: #6b7280;
      }

      .messages {
        margin-bottom: 16px;
      }

      .message {
        padding: 12px 16px;
        border-radius: 10px;
        margin-bottom: 10px;
        font-weight: 600;
      }

      .message.success {
        background: #dcfce7;
        color: #166534;
        border: 1px solid #86efac;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Book Library Manager</h1>
      <p>Manage your books and track availability.</p>
    </header>
    <main>
      {% if messages %}
      <div class="messages">
        {% for message in messages %}
        <div class="message {{ message.tags }}">{{ message }}</div>
        {% endfor %}
      </div>
      {% endif %} {% block content %}{% endblock %}
    </main>
  </body>
</html>
