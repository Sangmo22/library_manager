{% extends "base.html" %}

{% block title %}Add Book | Library Manager{% endblock %}

{% block content %}
<section class="card">
  <h2>Add a New Book</h2>
  <p>Fill in the details below to save a new book to your library.</p>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    <div class="actions">
      <button class="button" type="submit">Save Book</button>
      <a class="button" href="{% url 'books:book_list' %}" style="background:#4b5563;">Back to List</a>
    </div>
  </form>
</section>
{% endblock %}
