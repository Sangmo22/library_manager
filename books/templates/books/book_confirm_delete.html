{% extends "base.html" %}

{% block title %}Delete Book | Library Manager{% endblock %}

{% block content %}
<section class="card">
  <h2>Delete Book</h2>
  <p>Are you sure you want to delete <strong>{{ book.title }}</strong> by {{ book.author }}?</p>
  <p>This action cannot be undone.</p>

  <form method="post">
    {% csrf_token %}
    <div class="actions">
      <button class="button" type="submit" style="background:#dc2626;">Yes, Delete</button>
      <a class="button" href="{% url 'books:book_list' %}" style="background:#4b5563;">Cancel</a>
    </div>
  </form>
</section>
{% endblock %}
